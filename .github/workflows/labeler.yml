name: PR labeler

# Auto-applies area:* labels to a PR based on the files it changes (mapping in .github/labeler.yml).
on: [pull_request_target]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v7
        with:
          sync-labels: true
