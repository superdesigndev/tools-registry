<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>tools-registry - Tutorial</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<script src="/tutorial.js"></script>
<style>
  /* Ledger palette - same tokens as the dashboard. */
  :root{ --bg:#211d16;--panel:#2a251d;--panel2:#332d23;--ink:#f0e9d9;--muted:#a99e88;--line:#3b352a;
    --accent:#e0703f;--onAccent:#231c14;--green:#7fae72;--amber:#d0a24a;--red:#e08a7a;--r:14px;--rb:9px;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  [data-theme="light"]{ --bg:#f7f3ea;--panel:#fffdf8;--panel2:#f0eadc;--ink:#201c15;--muted:#877e6c;
    --line:#e3dac7;--accent:#b8461f;--onAccent:#fff;--green:#3f6f3f;--amber:#a8720a;--red:#a5382b;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:14px;line-height:1.5}
  a{color:var(--accent);text-decoration:none}
  code{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:12px}
  .top{display:flex;align-items:center;gap:14px;padding:13px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:20}
  .top .brand{font-weight:700;letter-spacing:-.3px} .top .sub{color:var(--muted);font-size:12px;font-family:var(--sans)} .top .spacer{flex:1}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:6px 12px;border-radius:var(--rb);font-family:var(--mono);font-size:12.5px;cursor:pointer}
  .btn:hover{border-color:var(--accent)} .btn.primary{background:var(--accent);border-color:var(--accent);color:var(--onAccent);font-weight:600}
  .btn:disabled{opacity:.45;cursor:not-allowed} .btn.sm{padding:4px 9px;font-size:12px}
  .md-dd{position:relative;display:inline-block}
  .md-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--panel);border:1px solid var(--line);border-radius:var(--rb);box-shadow:0 12px 30px rgba(0,0,0,.3);padding:5px;display:none;flex-direction:column;gap:2px;width:max-content;min-width:170px;z-index:30}
  .md-menu.show{display:flex}
  .md-menu button{background:none;border:0;color:var(--ink);text-align:left;padding:8px 12px;border-radius:6px;font-family:var(--mono);font-size:12.5px;cursor:pointer;white-space:nowrap}
  .md-menu button:hover{background:var(--panel2)}
  .panel{display:none;padding:16px 22px;border-bottom:1px solid var(--line);background:var(--panel)} .panel.show{display:block}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;max-width:1180px}
  .cards.wide{grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
  .card h4{margin:0 0 5px;font-size:13px;color:var(--accent)} .card p{margin:0;font-size:12px;color:var(--muted);font-family:var(--sans)}
  .card p code,.card p .mono{color:var(--accent);font-family:ui-monospace,Menlo,Consolas,monospace}
  .card pre{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px 10px;margin:6px 0;font-size:11px;overflow-x:auto;white-space:pre}
  table{border-collapse:collapse;max-width:640px;font-size:12.5px} th,td{border:1px solid var(--line);padding:6px 10px;text-align:center} td:first-child{text-align:left;color:var(--muted)}
  .wrap{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 56px)}
  nav.side{border-right:1px solid var(--line);padding:12px 10px;overflow:auto;max-height:calc(100vh - 56px);position:sticky;top:56px}
  .part{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin:14px 8px 5px}
  .step{display:block;width:100%;text-align:left;background:none;border:0;color:var(--ink);padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12px;border-left:2px solid transparent}
  .step:hover{background:var(--panel2)} .step.active{background:var(--panel2);border-left-color:var(--accent);color:var(--accent);font-weight:600}
  .step .n{color:var(--muted);margin-right:8px;font-variant-numeric:tabular-nums} .step.active .n{color:var(--accent)}
  main{padding:24px 30px;max-width:820px}
  .crumbs{color:var(--muted);font-size:11px;margin-bottom:4px}
  h2.title{margin:0 0 8px;font-size:22px;letter-spacing:-.3px}
  .persona{display:inline-block;font-size:11px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);margin-bottom:14px}
  .persona.tom{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 45%,var(--line))}
  .persona.bob{color:var(--green);border-color:color-mix(in srgb,var(--green) 45%,var(--line))}
  .persona.alice{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 45%,var(--line))}
  .persona.sys{color:var(--muted)} .persona.ops{color:var(--red);border-color:color-mix(in srgb,var(--red) 45%,var(--line))}
  .explain{font-family:var(--sans);font-size:13px;color:var(--muted);margin:2px 0 4px}
  .label{display:flex;align-items:center;gap:8px;font-family:var(--sans);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:18px 0 6px}
  .label .copy{margin-left:auto;border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:6px;padding:2px 9px;font-size:11px;cursor:pointer;font-family:var(--mono)}
  .label .copy:hover{color:var(--ink);border-color:var(--accent)}
  pre{margin:0;padding:14px;background:var(--bg);border:1px solid var(--line);border-radius:10px;font-family:var(--mono);font-size:12.5px;overflow:auto;white-space:pre-wrap;word-break:break-word}
  pre.out{color:var(--muted)}
  .notice{border-left:3px solid var(--amber);background:color-mix(in srgb,var(--amber) 9%,transparent);padding:10px 13px;border-radius:0 8px 8px 0;margin:16px 0;font-size:12.5px;font-family:var(--sans)} .notice b{color:var(--amber)}
  .foot{display:flex;gap:10px;align-items:center;margin-top:22px;padding-top:15px;border-top:1px solid var(--line)} .foot .pos{color:var(--muted);font-size:12px;margin:0 auto}
  .hl-comment{color:var(--muted);font-style:italic} .hl-string{color:var(--green)} .hl-var{color:#5f9ea0}
  .hl-flag{color:var(--amber)} .hl-env{color:var(--muted)} .hl-cmd{color:var(--accent);font-weight:600}
  .hl-key{color:#5f9ea0} .hl-str{color:var(--green)} .hl-num{color:var(--amber)} .hl-kw{color:var(--accent)} .hl-punct{color:var(--muted)}
  @media(max-width:800px){.wrap{grid-template-columns:1fr}nav.side{position:static;max-height:none;border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<header class="top">
  <span class="brand">▚ tools-registry</span>
  <span class="sub">Interactive tutorial - teams, roles, skills &amp; the credential-injecting proxy</span>
  <span class="spacer"></span>
  <button class="btn sm" id="conceptsBtn">Concepts</button>
  <button class="btn sm" id="rolesBtn">Roles</button>
  <button class="btn sm" id="authBtn">Auth shapes</button>
  <button class="btn sm" id="skillsBtn">Skills</button>
  <span class="md-dd">
    <button class="btn sm" id="mdBtn">Copy markdown ▾</button>
    <div class="md-menu" id="mdMenu">
      <button id="mdCopy">Copy to clipboard</button>
      <button id="mdOpen">Open in new tab</button>
    </div>
  </span>
  <button class="btn sm" id="themeBtn">◐</button>
</header>

<div id="conceptsPanel" class="panel"><div class="cards" id="conceptsCards"></div></div>
<div id="rolesPanel" class="panel"><table id="rolesTable"></table></div>
<div id="authPanel" class="panel"><div class="cards wide" id="authCards"></div></div>
<div id="skillsPanel" class="panel"><div class="cards wide" id="skillsCards"></div></div>

<div class="wrap">
  <nav class="side" id="nav"></nav>
  <main>
    <div class="crumbs" id="crumbs"></div>
    <h2 class="title" id="title"></h2>
    <span class="persona" id="persona"></span>
    <div class="explain" id="explain"></div>
    <div class="label">Command <button class="copy" id="copyBtn">copy</button></div>
    <pre class="cmd" id="cmd"></pre>
    <div class="label">Expected result</div>
    <pre class="out" id="out"></pre>
    <div class="notice" id="notice"></div>
    <div class="foot">
      <button class="btn sm" id="prev">← Prev</button>
      <span class="pos" id="pos"></span>
      <button class="btn sm" id="next">Next →</button>
    </div>
  </main>
</div>

<script>
(function(){
  const T = window.TREG_TUTORIAL;
  if(!T){ document.querySelector('main').innerHTML = '<p>Could not load the tutorial data (<code>/tutorial.js</code>). Open this page from the running server.</p>'; return; }
  const STEPS = T.steps, $ = id => document.getElementById(id);

  // build nav
  const nav = $('nav'); let lastPart = null;
  STEPS.forEach((s,i)=>{
    if(s.part!==lastPart){ const p=document.createElement('div'); p.className='part'; p.textContent=s.part; nav.appendChild(p); lastPart=s.part; }
    const b=document.createElement('button'); b.className='step'; b.dataset.i=i;
    b.innerHTML=`<span class="n">${String(i+1).padStart(2,'0')}</span>${s.title}`;
    b.onclick=()=>go(i); nav.appendChild(b);
  });

  // concepts + roles + auth + skills panels
  const cards = arr => (arr||[]).map(c=>`<div class="card"><h4>${c.h}</h4><p>${c.p}</p></div>`).join('');
  $('conceptsCards').innerHTML = cards(T.concepts);
  $('authCards').innerHTML = cards(T.auth);
  $('skillsCards').innerHTML = cards(T.skills);
  const R=T.roles; $('rolesTable').innerHTML =
    `<tr><th>Action</th>${R.cols.map(c=>`<th>${c}</th>`).join('')}</tr>` +
    R.rows.map(r=>`<tr><td>${r[0]}</td>${r[1].map(v=>`<td style="color:${v?'var(--green)':'var(--red)'}">${v?'✔':'✘'}</td>`).join('')}</tr>`).join('');

  let cur=0;
  function go(i){
    cur=Math.max(0,Math.min(STEPS.length-1,i)); const s=STEPS[cur];
    $('crumbs').textContent=s.part; $('title').textContent=s.title;
    const per=$('persona'); per.className='persona '+s.who; per.textContent=(T.personas[s.who]||{}).label||s.who;
    $('explain').innerHTML=s.explain;
    $('cmd').innerHTML=window.tregHL(s.cmd,'shell');
    $('out').innerHTML=window.tregHL(s.out, window.tregLang(s.out,'out'));
    $('notice').innerHTML='<b>What to notice:</b> '+s.notice;
    $('pos').textContent=`Step ${cur+1} of ${STEPS.length}`;
    $('prev').disabled=cur===0; $('next').disabled=cur===STEPS.length-1;
    [...nav.querySelectorAll('button.step')].forEach(b=>b.classList.toggle('active',+b.dataset.i===cur));
    const act=nav.querySelector('button.step.active'); if(act) act.scrollIntoView({block:'nearest'});
    window.scrollTo({top:0,behavior:'smooth'});
  }
  $('prev').onclick=()=>go(cur-1); $('next').onclick=()=>go(cur+1);
  $('copyBtn').onclick=function(){ navigator.clipboard.writeText(STEPS[cur].cmd); this.textContent='✓ copied'; setTimeout(()=>this.textContent='copy',1500); };
  document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')go(cur+1); if(e.key==='ArrowLeft')go(cur-1); });
  const PANELS=['concepts','roles','auth','skills'];
  const togglePanel=name=>PANELS.forEach(p=>{ const el=$(p+'Panel'); if(p===name) el.classList.toggle('show'); else el.classList.remove('show'); });
  $('conceptsBtn').onclick=()=>togglePanel('concepts');
  $('rolesBtn').onclick=()=>togglePanel('roles');
  $('authBtn').onclick=()=>togglePanel('auth');
  $('skillsBtn').onclick=()=>togglePanel('skills');
  // deep-link: /tutorial#auth  or  #skills  etc. opens that reference panel on load
  if(PANELS.includes((location.hash||'').slice(1))) togglePanel(location.hash.slice(1));
  $('themeBtn').onclick=()=>{ const el=document.documentElement; el.dataset.theme = el.dataset.theme==='dark'?'light':'dark'; };
  // copy-markdown dropdown: copy the raw /tutorial.md, or open it in a new tab
  $('mdBtn').onclick=e=>{ e.stopPropagation(); $('mdMenu').classList.toggle('show'); };
  document.addEventListener('click',()=>$('mdMenu').classList.remove('show'));
  $('mdCopy').onclick=async()=>{ try{ const t=await(await fetch('/tutorial.md')).text(); await navigator.clipboard.writeText(t);
    const b=$('mdBtn'); b.textContent='✓ copied'; setTimeout(()=>b.textContent='Copy markdown ▾',1500); }catch(e){} };
  $('mdOpen').onclick=()=>window.open('/tutorial.md','_blank');
  go(0);
})();
</script>
</body>
</html>
